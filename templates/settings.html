<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<main class="page">
  <section class="landing-card">
    <h1>Connect Four</h1>
    <p>Human vs AI</p>

    <form action="{{ url_for('game_page') }}" method="GET">

      <div class="control-group">
        <label for="difficulty-select">Difficulty</label>
        <select name="difficulty" id="difficulty-select">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="control-group">
        <label for="algorithm-select">Algorithm</label>
        <select name="algorithm" id="algorithm-select">
          <option value="alpha_beta" selected>Alpha-Beta</option>
          <option value="minimax">Minimax</option>
        </select>
      </div>

      <br>
      <button class="start-link" type="submit">Play Game</button>
    </form>
  </section>
</main>

</body>
</html>
