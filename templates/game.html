<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four Game</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
 
  <main class="page">
    <section class="game-wrapper">

      <header class="game-header">
        <h1>Connect Four</h1>
        <p class="subtitle">Human vs AI</p>
      </header>
      <div class="control-group">
      <button id="restart-button" type="button">Restart Game</button>
      </div>
<div id="restart-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Restart Game</h3>
    <p>What do you want to do?</p>

    <button id="restart-match-btn">Restart Match</button>
    <button id="change-settings-btn">Change Settings</button>
    <button id="cancel-btn">Cancel</button>
  </div>
</div>
      <section class="status-panel">
        <p id="status-message">Your turn</p>
      </section>

      <section class="board-section">
        <div id="board" class="board"></div>
      </section>

      <section class="ai-info-panel">

        <h2>AI Info</h2>

        <div class="info-grid">

          <div class="info-item">
            <span class="info-label">Algorithm</span>
            <span id="info-algorithm">alpha_beta</span>
          </div>

          <div class="info-item">
            <span class="info-label">Difficulty</span>
            <span id="info-difficulty">medium</span>
          </div>

          <div class="info-item">
            <span class="info-label">Last Column</span>
            <span id="info-column">-</span>
          </div>

          <div class="info-item">
            <span class="info-label">Score</span>
            <span id="info-score">-</span>
          </div>

          <div class="info-item">
            <span class="info-label">Depth</span>
            <span id="info-depth">-</span>
          </div>


        </div>

      </section>

    </section>
  </main>

  <script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>
</html>
